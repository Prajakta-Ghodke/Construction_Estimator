					<br>
					<br>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="contact-form">
                                <div></div>
                                <form action="insert.php" method="post" onsubmit="return validation()">
                                    <div class="form-group">
                                        <input type="text" class="form-control" name="nm" id="nm" placeholder="Your Name" autocomplete="off" />
                                        <span id="name" class="text-danger font-weight-bold"> </span>
                                    </div>
                                    <div class="form-group">
                                        <input type="email" class="form-control" name="email" id="emails" placeholder="Your Email" autocomplete="off" />
                                        <span id="emailids" class="text-danger font-weight-bold"> </span>
                                    </div>
                                    <div class="form-group">
                                        <input type="text" class="form-control" name="subj" id="subject" placeholder="Subject" autocomplete="off" />
                                        <span id="sub" class="text-danger font-weight-bold"> </span>
                                    </div>
                                    <div class="form-group">
                                        <input type="text" class="form-control" name="msg" id="message" placeholder="Message" autocomplete="off" />
                                        <span id="msgs" class="text-danger font-weight-bold"> </span>
                                    </div>
                                    <div>
                                        <button class="btn" type="submit" name="submit" id="submit">Submit</button>
										<button class="btn" type="reset" id="reset">Reset</button>
                                    </div>
                                </form>
                            </div>
                        </div>

			<script type="text/javascript">
		

		function validation(){

		var names = document.getElementById('nm').value;
		var email = document.getElementById('emails').value;
		var subj = document.getElementById('subject').value;
		var msg = document.getElementById('message').value;



		if(names == ""){
		document.getElementById('name').innerHTML =" ** Please fill the name field";
		return false;
		}

		if((names.length <= 2) || (names.length > 20)) {
		document.getElementById('name').innerHTML =" ** Name length must be between 2 and 20";
		return false;	
		}

		if(!isNaN(names)){
		document.getElementById('name').innerHTML =" ** Only characters are allowed";
		return false;
		}

		if(email == ""){
		document.getElementById('emailids').innerHTML =" ** Please fill the email id field";
		return false;
		}

		if(email.indexOf('@') <= 0 ){
		document.getElementById('emailids').innerHTML =" ** @ Invalid Position";
		return false;
		}

		if((email.charAt(email.length-4)!='.') && (email.charAt(email.length-3)!='.')){
		document.getElementById('emailids').innerHTML =" ** . Invalid Position";
		return false;
		}
		
		if(subj == ""){
		document.getElementById('sub').innerHTML =" ** Please fill the subject field";
		return false;
		}

		if(subj.length <= 2) {
		document.getElementById('sub').innerHTML =" ** Subject length must be greater than 2";
		return false;	
		}

		if(!isNaN(subj)){
		document.getElementById('sub').innerHTML =" ** Only characters are allowed";
		return false;
		}

		if(msg == ""){
		document.getElementById('msgs').innerHTML =" ** Please fill the field";
		return false;
		}

		if(msg.length <= 2) {
		document.getElementById('msgs').innerHTML =" ** Length of the text must be graeter than 2";
		return false;	
		}

		if(!isNaN(msg)){
		document.getElementById('msgs').innerHTML =" ** Only characters are allowed";
		return false;
		}
		}

	</script>
